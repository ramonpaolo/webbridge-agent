<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agent-webbridge</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <header id="status-bar">
            <div class="status-left">
                <span id="connection-status" class="status disconnected">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </span>
                <span id="agent-name" class="agent-name">Agent</span>
            </div>
            <div class="status-right">
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51-1"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main id="chat-container">
            <div id="welcome-message" class="welcome">
                <div class="welcome-icon">🤖</div>
                <h2>Connect to your agent</h2>
                <p>Enter your API key to start chatting</p>
            </div>
            <div id="messages" class="messages"></div>
        </main>

        <footer id="input-area">
            <div id="file-preview" class="file-preview hidden"></div>
            <div class="input-row">
                <button id="attach-btn" class="icon-btn" title="Attach files">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <input type="file" id="file-input" multiple hidden accept="image/*,.pdf,.doc,.docx,.txt">
                <textarea id="message-input" placeholder="Type a message..." rows="1" autofocus></textarea>
                <button id="send-btn" class="send-btn" disabled title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="close-settings" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="api-key-input">API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk_live_...">
                </div>
                <div class="form-group">
                    <label for="agent-name-input">Agent Name</label>
                    <input type="text" id="agent-name-input" placeholder="Agent" value="Agent">
                </div>
                <div class="form-group">
                    <label for="ws-url-input">WebSocket URL</label>
                    <input type="text" id="ws-url-input" placeholder="ws://localhost:8080/ws" value="/ws">
                </div>
            </div>
            <div class="modal-footer">
                <button id="connect-btn" class="btn primary">Connect</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
